name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (SQLite default backend)
        run: go test ./...

  postgres:
    # Postgres-path job: exercises the shared-Neon consolidation backend
    # (DATABASE_URL → schema `talk`). Runs the dual-backend tests with the
    # Postgres branch enabled via VULOS_TEST_POSTGRES.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: talk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      VULOS_TEST_POSTGRES: postgres://postgres:postgres@localhost:5432/talk_test?sslmode=disable
      VULOS_TEST_POSTGRES_DSN: postgres://postgres:postgres@localhost:5432/talk_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test (Postgres backend, schema=talk)
        run: go test ./...
