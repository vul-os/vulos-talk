name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout sibling vulos-apps
        run: git clone --depth 1 https://github.com/vul-os/vulos-apps ../vulos-apps

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Verify tag matches declared version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          go build -ldflags "-X main.Version=${VERSION}" -o /tmp/vulos-talk-check .
          BIN_VER=$(/tmp/vulos-talk-check --version 2>&1 | awk '{print $NF}')
          if [ "${BIN_VER}" != "${VERSION}" ]; then
            echo "ERROR: binary reports version '${BIN_VER}' but tag is '${TAG}'"
            exit 1
          fi
          echo "Version check passed: ${VERSION}"

      - name: Build release binaries
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          mkdir -p builds/vulos-talk

          # linux/amd64
          GOOS=linux GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o builds/vulos-talk/vulos-talk .
          cd builds && zip -r "vulos-talk_${VERSION}_linux_amd64.zip" vulos-talk/ && cd ..
          rm builds/vulos-talk/vulos-talk

          # linux/arm64
          GOOS=linux GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o builds/vulos-talk/vulos-talk .
          cd builds && zip -r "vulos-talk_${VERSION}_linux_arm64.zip" vulos-talk/ && cd ..
          rm builds/vulos-talk/vulos-talk

          # darwin/amd64
          GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o builds/vulos-talk/vulos-talk .
          cd builds && zip -r "vulos-talk_${VERSION}_darwin_amd64.zip" vulos-talk/ && cd ..
          rm builds/vulos-talk/vulos-talk

          # darwin/arm64 (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o builds/vulos-talk/vulos-talk .
          cd builds && zip -r "vulos-talk_${VERSION}_darwin_arm64.zip" vulos-talk/ && cd ..
          rm builds/vulos-talk/vulos-talk

          # Source archive
          git archive --format=zip HEAD -o "builds/vulos-talk_${VERSION}_source.zip"

          rm -rf builds/vulos-talk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: builds/*
          generate_release_notes: true
